name: yb_staff_app
description: "YukBersihin Staff — aplikasi operasional harian untuk staff."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  flutter_riverpod: ^2.5.1
  google_fonts: ^6.2.1
  http: ^1.2.2
  flutter_secure_storage: ^9.2.2
  intl: ^0.20.2
  url_launcher: ^6.3.0
  alice: ^1.0.0
  alice_http: ^1.0.7
  image_picker: ^1.1.2
  connectivity_plus: ^6.1.4
  flutter_native_splash: ^2.4.6
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^19.0.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#1B4332"
  adaptive_icon_foreground: "assets/icon/app_icon.png"
  remove_alpha_ios: true
  background_color_ios: "#1B4332"

flutter_native_splash:
  color: "#1B4332"
  image: "assets/icon/app_icon.png"
  android_12:
    image: "assets/icon/app_icon.png"
    color: "#1B4332"
  ios: true
  android: true

flutter:
  uses-material-design: true

  assets:
    - assets/icon/
    - assets/images/
